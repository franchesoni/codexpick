name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile
        run: python -m py_compile codexpick_cli.py
      - name: Check package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          codexpick --help
